{% extends "public/base.html" %}

{% block title %}
Verify Email | CareerGPS
{% endblock %}

{% block content %}

<section class="auth-page">

    <div class="auth-card">

        <h1>
            Verify your email
        </h1>

        <p class="auth-subtitle">
            Enter the verification code sent to your email address.
        </p>

        <form id="verifyEmailForm" class="auth-form">

            <div class="form-group">
                <label for="email">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="code">
                    Verification Code
                </label>

                <input
                    type="text"
                    id="code"
                    maxlength="6"
                    placeholder="Enter 6-digit code"
                    required
                >
            </div>

            <button type="submit" class="auth-submit">
                Verify Email
            </button>

            <p id="verifyMessage" class="auth-message"></p>

        </form>

        <div class="auth-links">

            <a href="/login/">
                Back to sign in
            </a>

        </div>

    </div>

</section>

<script>
    const verifyEmailForm =
        document.getElementById("verifyEmailForm");

    const verifyMessage =
        document.getElementById("verifyMessage");

    const params =
        new URLSearchParams(window.location.search);

    const emailFromUrl =
        params.get("email");

    if (emailFromUrl) {
        document.getElementById("email").value = emailFromUrl;
    }

    verifyEmailForm.addEventListener("submit", function(event) {

        event.preventDefault();

        const email =
            document.getElementById("email").value.trim();

        const code =
            document.getElementById("code").value.trim();

        verifyMessage.textContent =
            "Verifying email...";

        verifyMessage.className =
            "auth-message";

        fetch("/api/verify-email/", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                email: email,
                code: code
            })

        })
            .then(response => response.json())
            .then(data => {

                if (data.success) {

                    verifyMessage.textContent =
                        "Email verified. Redirecting to sign in...";

                    verifyMessage.className =
                        "auth-message success";

                    setTimeout(() => {
                        window.location.href = "/login/";
                    }, 1200);

                }
                else {

                    verifyMessage.textContent =
                        data.error || "Verification failed.";

                    verifyMessage.className =
                        "auth-message error";

                }

            })
            .catch(error => {

                console.error(error);

                verifyMessage.textContent =
                    "Something went wrong. Please try again.";

                verifyMessage.className =
                    "auth-message error";

            });

    });
</script>

{% endblock %}
