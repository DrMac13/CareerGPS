{% extends "public/base.html" %}

{% block title %}
Sign In | CareerGPS
{% endblock %}

{% block content %}

<section class="auth-page">

    <div class="auth-card">

        <h1>
            Sign in to CareerGPS
        </h1>

        <p class="auth-subtitle">
            Access your recommendations, saved opportunities,
            applications and interview progress.
        </p>

        <form id="loginForm" class="auth-form">

            <div class="form-group">
                <label for="email">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="auth-submit">
                Sign In
            </button>

            <p id="loginMessage" class="auth-message"></p>

        </form>

        <div class="auth-links">

            <a href="/forgot-password/">
                Forgot password?
            </a>

            <span>
                |
            </span>

            <a href="/register/">
                Create account
            </a>

        </div>

    </div>

</section>

<script>
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");

    loginForm.addEventListener("submit", function(event) {
        event.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        loginMessage.textContent = "Signing in...";
        loginMessage.className = "auth-message";

        fetch("/api/login/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loginMessage.textContent = "Login successful. Redirecting...";
                    loginMessage.className = "auth-message success";

                    window.location.href = "/dashboard/";
                }
                else {
                    loginMessage.textContent = data.error || "Invalid email or password.";
                    loginMessage.className = "auth-message error";
                }
            })
            .catch(error => {
                console.error(error);

                loginMessage.textContent = "Something went wrong. Please try again.";
                loginMessage.className = "auth-message error";
            });
    });
</script>

{% endblock %}
