{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerGPS Applications</title>

    <link
        rel="stylesheet"
        href="{% static 'css/dashboard.css' %}"
    >
</head>

<body>

<div class="dashboard-layout">

    <aside class="sidebar">

        <div class="sidebar__logo">
            <span class="logo-orange">Career</span><span class="logo-white">GPS</span>
        </div>

        <nav class="sidebar__nav">
            <a href="/dashboard/" class="sidebar__link">Dashboard</a>
            <a href="/dashboard/opportunities/" class="sidebar__link">Opportunities</a>
            <a href="/dashboard/applications/" class="sidebar__link active">My Applications</a>
            <a href="#history" class="sidebar__link">Interview History</a>
            <a href="#analytics" class="sidebar__link">Interview Analytics</a>
        </nav>

    </aside>

    <main class="main">

        <div class="dashboard-header">
            <h1>My Applications</h1>
            <p>
                Track the opportunities you have applied for
                and monitor your application activity.
            </p>
        </div>

        <section class="section">

            <h2 class="section__title">
                Application Tracker
            </h2>

            <div
                id="applicationsList"
                class="card-grid"
            >
                Loading applications...
            </div>

        </section>

    </main>

</div>

<script src="{% static 'js/dashboard.js' %}"></script>

</body>
</html>
