{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerGPS Interview Analytics</title>

    <link
        rel="stylesheet"
        href="{% static 'css/dashboard.css' %}"
    >

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="dashboard-layout">
    {% include "dashboard/partials/sidebar.html" %}

    <main class="main">

        <div class="dashboard-header">
            <h1>Interview Analytics</h1>
            <p>
                Analyse your interview performance, score trends,
                strengths, and weaker areas.
            </p>
        </div>

        <section class="section">

            <h2 class="section__title">
                Performance Summary
            </h2>

            <div
                id="interviewAnalytics"
                class="card-grid"
            >
                Loading analytics...
            </div>

        </section>

        <section class="section">

            <div class="chart-card">

                <h3>
                    Interview Score Trend
                </h3>

                <canvas
                    id="interviewTrendChart"
                ></canvas>

            </div>

        </section>

    </main>

</div>

<script src="{% static 'js/dashboard.js' %}"></script>

</body>
</html>
